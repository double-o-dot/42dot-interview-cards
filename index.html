<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>42dot DB Interview Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--p:#0f3460;--a:#e94560;--bg:#0d1117;--card:#161b22;--card-open:#1c2333;--text:#e6edf3;--dim:#8b949e;--border:#30363d;--code-bg:#1e2430;--tag-bg:#1f2a3d;--tag-text:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;padding-bottom:80px}
/* nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.nav h1{font-size:15px;font-weight:700;flex:1}
.nav .cnt{font-size:12px;color:var(--dim)}
/* filter */
.filter{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid var(--border);color:var(--dim);background:transparent;cursor:pointer;transition:.2s}
.chip.active{background:var(--p);color:#fff;border-color:var(--p)}
/* cards */
.cards{padding:0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:background .2s}
.card.open{background:var(--card-open)}
.card-head{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;-webkit-user-select:none;user-select:none}
.q-num{background:var(--a);color:#fff;font-size:12px;font-weight:700;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-text{font-size:13.5px;font-weight:500;line-height:1.5;flex:1}
.arrow{color:var(--dim);font-size:18px;transition:transform .3s;flex-shrink:0}
.card.open .arrow{transform:rotate(180deg)}
.part-tag{font-size:10px;color:var(--tag-text);background:var(--tag-bg);padding:2px 8px;border-radius:10px;flex-shrink:0}
/* body */
.card-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.card.open .card-body{max-height:5000px}
.card-inner{padding:0 16px 18px}
.card-inner h4{font-size:13px;font-weight:700;color:var(--tag-text);margin:14px 0 8px;padding-left:2px}
.card-inner h4:first-child{margin-top:4px}
.card-inner p,.card-inner li{font-size:13px;line-height:1.8;color:#c9d1d9}
.card-inner ul,.card-inner ol{padding-left:18px;margin:6px 0}
.card-inner li{margin-bottom:3px}
.card-inner strong{color:var(--text)}
.card-inner code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--code-bg);color:#79c0ff;padding:2px 6px;border-radius:4px}
.card-inner pre{background:var(--code-bg);padding:14px;border-radius:8px;overflow-x:auto;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9}
.card-inner pre code{background:none;padding:0;color:inherit}
/* table */
.card-inner table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.card-inner thead th{background:var(--p);color:#fff;padding:8px 10px;text-align:left;font-weight:500;font-size:11.5px}
.card-inner tbody td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
.card-inner tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
/* tip */
.tip{background:rgba(233,69,96,.08);border-left:3px solid var(--a);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:12.5px;line-height:1.7}
.tip .label{font-weight:700;color:var(--a)}
/* part divider */
.part-div{padding:20px 16px 8px;display:flex;align-items:center;gap:10px}
.part-div .num{font-size:11px;font-weight:700;color:var(--a);letter-spacing:2px}
.part-div .title{font-size:14px;font-weight:700;color:var(--text)}
/* scroll to top */
.top-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.4);z-index:99}
.top-btn.show{display:flex}
</style>
</head>
<body>

<div class="nav">
  <h1>42dot DB Interview</h1>
  <span class="cnt" id="counter">20 cards</span>
</div>

<div class="filter" id="filter"></div>
<div class="cards" id="cards"></div>
<button class="top-btn" id="topBtn" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const DATA = [
  // ── Part 1 ──
  {part:"자기소개",partNum:1,num:1,q:"간단한 자기소개와 지원 동기를 말씀해주세요.",a:`<p>안녕하세요, 9년차 데이터베이스 엔지니어 서웅입니다.</p><p>신한은행에서 5년간 Oracle RAC 기반 계정계/정보계 시스템을 운영하며 미션 크리티컬 환경에서의 HA, DR, 데이터 보안 체계를 체화했고, 현재 컬리에서는 AWS Aurora/PostgreSQL 기반의 대규모 이커머스 DB를 운영하며 클라우드 네이티브 전환과 자동화를 주도하고 있습니다.</p><p>42dot이 자율주행이라는 미션 크리티컬 서비스를 위해 멀티 클라우드 환경에서 RDS, MongoDB, Neo4j, ClickHouse 등 이기종 DB를 운영한다는 점에서, 제가 쌓아온 안정성 중심의 운영 철학과 클라우드 DB 전문성이 직접적으로 기여할 수 있다고 판단하여 지원했습니다.</p><div class="tip"><span class="label">Point </span>금융(안정성) + 이커머스(확장성) 두 축. 42dot JD 키워드(멀티 클라우드, 이기종 DB, DBRE)에 연결.</div>`},

  // ── Part 2 ──
  {part:"PostgreSQL",partNum:2,num:2,q:"PostgreSQL의 MVCC를 설명해주세요. Oracle과 어떤 차이가 있나요?",a:`<p>PostgreSQL은 MVCC를 통해 읽기/쓰기가 서로를 블로킹하지 않습니다. 각 트랜잭션은 고유 XID를 가지며, tuple에 <code>xmin</code>/<code>xmax</code>가 저장됩니다. UPDATE 시 기존 행을 삭제 마킹하고 새 행을 INSERT합니다.</p><h4>Oracle과의 차이</h4><table><thead><tr><th>항목</th><th>PostgreSQL</th><th>Oracle</th></tr></thead><tbody><tr><td>Undo 처리</td><td>테이블 내 dead tuple</td><td>별도 Undo Tablespace</td></tr><tr><td>Vacuum</td><td>필수 (dead tuple 정리)</td><td>불필요 (Undo 자동)</td></tr><tr><td>읽기 일관성</td><td>Snapshot Isolation</td><td>Undo 기반 CR</td></tr><tr><td>인덱스 영향</td><td>dead tuple이 인덱스에도 영향</td><td>Undo와 무관</td></tr></tbody></table><p>단점은 dead tuple bloat → <code>autovacuum</code> 튜닝 + <code>pg_repack</code>으로 대응.</p>`},

  {part:"PostgreSQL",partNum:2,num:3,q:"Vacuum과 Autovacuum 튜닝 경험을 설명해주세요.",a:`<h4>Vacuum의 역할</h4><ol><li>Dead tuple 회수 → 디스크 재사용</li><li>XID Wraparound 방지 (freeze)</li><li>Visibility Map 갱신 → Index-Only Scan</li></ol><h4>Autovacuum 튜닝</h4><ul><li><code>autovacuum_vacuum_scale_factor</code> 0.2 → 0.01~0.05 (더 자주 실행)</li><li><code>autovacuum_vacuum_cost_delay</code> 2ms → 0ms</li><li><code>autovacuum_max_workers</code> 증가</li><li>테이블별 개별 설정: <code>ALTER TABLE SET (...)</code></li></ul><h4>장애 예방</h4><ul><li><code>pg_stat_user_tables</code>의 <code>n_dead_tup</code> Datadog 모니터링</li><li>XID age 모니터링 → Wraparound 알럿</li><li>bloat 테이블 → <code>pg_repack</code> 온라인 REORGANIZE</li></ul>`},

  {part:"PostgreSQL",partNum:2,num:4,q:"쿼리 성능 튜닝을 어떻게 접근하시나요?",a:`<h4>1단계 — 문제 식별</h4><ul><li><code>pg_stat_statements</code> Top-N slow query</li><li><code>pg_stat_activity</code> long-running query</li><li><code>pg_locks</code> + <code>pg_stat_activity</code> 조인 → Lock 경합</li></ul><h4>2단계 — 실행 계획 분석</h4><pre><code>EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT) SELECT ...;</code></pre><ul><li>Seq Scan → 인덱스 누락/통계 부정확</li><li>Nested Loop 대량 데이터 → Hash/Merge Join 검토</li><li>Buffers hit vs read → 캐시 적중률</li></ul><h4>3단계 — 대응</h4><ul><li>적절한 인덱스 (B-tree, GIN, GiST, BRIN)</li><li>ANALYZE 통계 갱신 / 파티셔닝 / 파라미터 조정</li></ul><div class="tip"><span class="label">실무 </span>컬리 물류 주문 조회 Seq Scan 30초 → 복합 인덱스 + 파티셔닝 → 200ms</div>`},

  {part:"PostgreSQL",partNum:2,num:5,q:"Replication 방식과 HA 구성 경험을 설명해주세요.",a:`<h4>Streaming Replication</h4><ul><li>WAL을 Primary → Standby 스트리밍 전송</li><li>동기: 무손실, 약간 지연 / 비동기: 성능 우수, 약간 유실 가능</li></ul><h4>Logical Replication</h4><ul><li>테이블 단위 선택적 복제, 다른 버전/DB간 가능</li><li>Publication/Subscription 모델</li></ul><h4>HA 구성 경험</h4><ul><li>AWS: Aurora Multi-AZ (자동 Failover 30초 이내)</li><li>On-prem: Patroni + etcd 자동 Failover</li><li>금융권: RPO=0 (동기) + RTO < 60초</li></ul>`},

  {part:"PostgreSQL",partNum:2,num:6,q:"인덱스 종류와 선택 기준을 설명해주세요.",a:`<table><thead><tr><th>타입</th><th>시나리오</th></tr></thead><tbody><tr><td><strong>B-tree</strong></td><td>기본. 등호/범위, ORDER BY</td></tr><tr><td><strong>Hash</strong></td><td>단순 등호 (PG10+ 안정화)</td></tr><tr><td><strong>GIN</strong></td><td>전문검색, JSONB, 배열</td></tr><tr><td><strong>GiST</strong></td><td>PostGIS, 범위, 근접 검색</td></tr><tr><td><strong>BRIN</strong></td><td>시계열 대용량 (물리정렬)</td></tr><tr><td><strong>SP-GiST</strong></td><td>비균형 트리 (IP, 전화번호)</td></tr></tbody></table><h4>42dot 맥락</h4><ul><li>센서 시계열 → <strong>BRIN</strong></li><li>위치/지도 → <strong>GiST</strong> + PostGIS</li><li>JSON 메타데이터 → <strong>GIN</strong></li><li>pgvector → <strong>IVFFlat / HNSW</strong></li></ul>`},

  {part:"PostgreSQL",partNum:2,num:7,q:"pgvector에 대해 설명해주세요. 왜 별도 VectorDB 대신 PostgreSQL을?",a:`<p>PostgreSQL 확장으로 벡터 저장 + ANN 유사도 검색 수행.</p><pre><code>CREATE EXTENSION vector;
CREATE TABLE items (id serial PRIMARY KEY, embedding vector(1536));
CREATE INDEX ON items USING hnsw (embedding vector_cosine_ops);
SELECT * FROM items ORDER BY embedding <=> '[...]' LIMIT 10;</code></pre><h4>pgvector 선택 이유</h4><ol><li>운영 복잡도 감소 (별도 클러스터 불필요)</li><li>트랜잭션 지원 (벡터 + 메타데이터 ACID)</li><li>기존 인프라 활용 (백업, 복제, 모니터링)</li><li>JOIN 가능 (비즈니스 테이블과 조인)</li></ol><h4>42dot 벡터 활용 시나리오</h4><table><thead><tr><th>영역</th><th>용도</th><th>차원</th><th>규모</th><th>저장소</th></tr></thead><tbody><tr><td><strong>주행 장면 검색<br>(Atria AI)</strong></td><td>코너 케이스 검색 — 유사 장면을 수천만 클립에서 검색<br><em>CLIP, DINOv2</em></td><td>768~1024</td><td>수천만</td><td>전용 VectorDB</td></tr><tr><td><strong>Gleo AI<br>(차량 내 RAG)</strong></td><td>매뉴얼/FAQ 벡터화 → LLM 컨텍스트<br><em>multilingual-e5, OpenAI</em></td><td>768~1536</td><td>수십만</td><td><strong>pgvector 적합</strong></td></tr></tbody></table><div class="tip"><span class="label">판단 </span>규모+요구사항에 따라 적합한 저장소 선택이 DB 엔지니어의 역할.</div>`},

  // ── Part 3 ──
  {part:"클라우드",partNum:3,num:8,q:"온프레미스 → 클라우드 마이그레이션 경험을 설명해주세요.",a:`<h4>컬리 마이그레이션</h4><p><strong>배경:</strong> TB 규모 Oracle → AWS Aurora MySQL</p><h4>전략</h4><ol><li>AWS DMS Full Load + CDC 무중단 마이그레이션</li><li>AWS SCT + 수동 검증 병행 스키마 변환</li></ol><h4>과제와 해결</h4><ul><li><strong>정합성:</strong> DMS validation task</li><li><strong>PL/SQL:</strong> MySQL 호환 코드 재작성</li><li><strong>성능:</strong> 실행 계획 비교 + 인덱스 재설계</li><li><strong>Cutover:</strong> Blue-Green 롤백 가능 전환</li></ul><p><strong>결과:</strong> 다운타임 수분 이내, Aurora Serverless v2 비용 최적화</p>`},

  {part:"클라우드",partNum:3,num:9,q:"Aurora Serverless v2 오토스케일링 설계 경험은?",a:`<h4>설계 원칙</h4><ul><li>개발: 0.5~8 ACU / 운영: 4~64 ACU</li><li>CPU/메모리 기반 자동 스케일링</li></ul><h4>실무에서 배운 점</h4><ul><li>급격한 트래픽 → 스케일업 지연 가능 → Warm Pool 활용</li><li><code>max_connections</code>가 ACU에 비례 변동 → 커넥션 풀 필수</li><li>스케일다운 시 기존 커넥션 유지 확인</li></ul><p><strong>모니터링:</strong> Datadog — ACU, 커넥션 수, 쿼리 레이턴시</p>`},

  {part:"클라우드",partNum:3,num:10,q:"멀티 클라우드 환경 DB 운영 시 고려사항은?",a:`<ol><li><strong>데이터 일관성:</strong> Eventual vs Strong Consistency</li><li><strong>네트워크:</strong> 리전 간 지연 최소화 (VPN/Direct Connect)</li><li><strong>보안:</strong> 클라우드별 IAM/KMS 통합, TLS 암호화</li><li><strong>IaC:</strong> Terraform 멀티 클라우드 코드 관리</li><li><strong>모니터링:</strong> Datadog/Grafana 통합</li><li><strong>DR:</strong> Active-Active/Standby, RPO/RTO 정의</li><li><strong>비용:</strong> RI, Spot, 리소스 태깅 추적</li></ol>`},

  // ── Part 4 ──
  {part:"보안",partNum:4,num:11,q:"DB 보안 관리와 민감 데이터 처리 경험은?",a:`<h4>금융권 보안 경험</h4><ul><li>RBAC + IP 기반 접근 통제</li><li>pgaudit DML/DDL 감사 로그</li><li>TDE + 컬럼 레벨 암호화</li><li>개발환경 데이터 마스킹</li><li>Principle of Least Privilege</li></ul><h4>PostgreSQL 보안</h4><pre><code>ALTER TABLE sensitive_data ENABLE ROW LEVEL SECURITY;
CREATE POLICY user_access ON sensitive_data
  FOR SELECT USING (dept = current_setting('app.dept'));

ALTER SYSTEM SET pgaudit.log = 'write, ddl';</code></pre><div class="tip"><span class="label">42dot </span>자율주행 차량 위치/탑승자 개인정보 → GDPR/개인정보보호법 준수 데이터 수명주기 관리 필요.</div>`},

  // ── Part 5 ──
  {part:"DBRE",partNum:5,num:12,q:"DBRE란 무엇이며, 어떻게 실천하고 계신가요?",a:`<p><strong>DBRE:</strong> SRE 원칙을 DB 운영에 적용. Toil 줄이고, 자동화+관측성으로 DB 신뢰성을 엔지니어링.</p><h4>1. 자동화 — Oracle Session Sniper</h4><table><thead><tr><th>항목</th><th>기존 (수동)</th><th>개선 (Sniper)</th></tr></thead><tbody><tr><td>대응</td><td>DBA v$session 수동 Kill</td><td>1분 주기 자동 탐지/Kill</td></tr><tr><td>야간/주말</td><td>대응 불가</td><td>24/7 자동</td></tr><tr><td>인지 시간</td><td>수십 분</td><td>1분 이내</td></tr><tr><td>오탐</td><td>수동 판단</td><td>6중 AND + CONNECT BY</td></tr></tbody></table><ul><li>On-Prem RAC + AWS RDS 이기종 통합</li><li>Slack Block Kit 알림 + MySQL 이력 로깅</li><li>Docker + Github Actions CI/CD → ECR → EC2</li><li>4주 개발 → <strong>2026-03-31 live 운영 중</strong></li></ul><h4>2. 관측성</h4><ul><li>Datadog PostgreSQL 대시보드 (Connection, Latency, Lag, Dead tuple, Cache hit)</li></ul><h4>3. SLO/SLI</h4><ul><li>가용성 99.95% / P99 < 500ms / Lag < 1초</li></ul>`},

  {part:"DBRE",partNum:5,num:13,q:"운영 자동화 도구를 직접 개발한 경험이 있나요?",a:`<h4>Go — Oracle Session Sniper (대표)</h4><ul><li>Go 1.25, Pure Go 드라이버(<code>sijms/go-ora</code>) — CGO 불필요</li><li>goroutine + WaitGroup 다중 DB 병렬 처리</li><li>CONNECT BY Blocking Tree + GV$LOCK JOIN</li><li>On-Prem RAC / AWS RDS 자동 분기</li><li>Slack Bot API (Block Kit) — 컬러바+코드블록+스레드, 에러 쿨다운 30분</li><li>MySQL <code>session_cemetery</code> Kill 이력 적재</li><li>Docker Multi-stage → Github Actions → ECR → EC2 crontab</li><li>YAML 외부 설정 + dry-run 기본 true</li><li>단일 <code>main.go</code> 1,012줄, 4주 개발 → 운영 중</li></ul><h4>Python</h4><ul><li>pg_stat_statements 쿼리 분석 리포트</li><li>마이그레이션 데이터 정합성 검증</li></ul><h4>Bash</h4><ul><li>일일/주간 DB 점검 (디스크, 커넥션, Replication, 백업)</li></ul>`},

  // ── Part 6 ──
  {part:"MongoDB",partNum:6,num:14,q:"MongoDB와 RDBMS 차이. 어떤 상황에서 MongoDB를?",a:`<table><thead><tr><th>항목</th><th>PostgreSQL</th><th>MongoDB</th></tr></thead><tbody><tr><td>모델</td><td>정규화 테이블/행</td><td>Document (BSON)</td></tr><tr><td>스키마</td><td>고정</td><td>Schema-less</td></tr><tr><td>트랜잭션</td><td>강력 ACID</td><td>4.0+ 멀티문서 ACID</td></tr><tr><td>확장</td><td>Scale-up</td><td>Scale-out (샤딩)</td></tr><tr><td>JOIN</td><td>네이티브</td><td>$lookup (제한적)</td></tr></tbody></table><h4>MongoDB 선택 시나리오</h4><ul><li>스키마 자주 변경 / 비정형 데이터 (IoT, 로그)</li><li>수평 확장 대용량 쓰기</li></ul><div class="tip"><span class="label">솔직하게 </span>현재 hands-on 학습 중. CRUD, Aggregation, Replica Set, Sharding 학습. RDBMS 경험 기반 빠른 적응 가능.</div>`},

  {part:"MongoDB",partNum:6,num:15,q:"MongoDB Replica Set과 Sharding을 설명해주세요.",a:`<h4>Replica Set</h4><ul><li>Primary 1 + Secondary N, Election 자동 Failover</li><li>Read Preference로 읽기 분산</li><li>oplog 기반 복제</li></ul><h4>Sharding</h4><ul><li>mongos(라우터) + config server + shard(replica set)</li><li>Shard Key = 카디널리티 높고 쓰기 분산 고른 필드</li><li>Range vs Hash Sharding</li></ul><p>PostgreSQL은 Citus로 분산 가능하지만, MongoDB는 네이티브 샤딩으로 수평 확장이 더 용이.</p>`},

  // ── Part 7 ──
  {part:"42dot",partNum:7,num:16,q:"자율주행에서 DB 엔지니어의 역할은?",a:`<table><thead><tr><th>데이터 유형</th><th>예시</th><th>저장소</th></tr></thead><tbody><tr><td>센서/텔레메트리</td><td>LiDAR, 카메라, GPS</td><td>ClickHouse</td></tr><tr><td>지도/공간</td><td>HD Map, 경로</td><td>PostGIS / GraphDB</td></tr><tr><td>차량 상태</td><td>펌웨어, OTA</td><td>MongoDB</td></tr><tr><td>서비스 트랜잭션</td><td>예약, 결제</td><td>PostgreSQL</td></tr><tr><td>ML 임베딩</td><td>모델 학습 데이터</td><td>pgvector / Milvus</td></tr></tbody></table><h4>역할</h4><ul><li>데이터 특성별 <strong>적합한 저장소 선택/설계</strong></li><li>멀티 DB <strong>통합 운영/모니터링</strong></li><li>미션 크리티컬 <strong>HA/DR/보안</strong></li><li>개발팀 <strong>스키마 리뷰 & 쿼리 최적화 지원</strong></li></ul>`},

  {part:"42dot",partNum:7,num:17,q:"Neo4j(GraphDB)에 대한 이해가 있으신가요?",a:`<h4>기본 이해</h4><ul><li>Property Graph: Node + Relationship + Property</li><li>Cypher: <code>MATCH (a)-[:KNOWS]->(b) RETURN a,b</code></li><li>관계 탐색 O(1) → JOIN 대비 관계 쿼리 압도적</li></ul><h4>42dot 활용 가능성</h4><ul><li>HD Map 도로 네트워크 (교차로=Node, 도로=Relationship)</li><li>최단 경로 / 교통 상황 경로 계산</li><li>V2X, 플릿 관리 관계 모델링</li></ul><p>운영 경험은 없지만 개념 학습 중. RDBMS 모델링 경험 기반 빠른 적용 가능.</p>`},

  {part:"42dot",partNum:7,num:18,q:"ClickHouse는 어떤 경우에? PostgreSQL과 차이?",a:`<table><thead><tr><th>항목</th><th>PostgreSQL</th><th>ClickHouse</th></tr></thead><tbody><tr><td>저장</td><td>Row-based</td><td>Column-based</td></tr><tr><td>워크로드</td><td>OLTP</td><td>OLAP</td></tr><tr><td>UPDATE/DELETE</td><td>완전 지원</td><td>제한적 (Mutation)</td></tr><tr><td>트랜잭션</td><td>MVCC 강력</td><td>대량 INSERT 최적화</td></tr><tr><td>압축</td><td>보통</td><td>매우 높음 (LZ4/ZSTD)</td></tr></tbody></table><div class="tip"><span class="label">42dot </span>자율주행 센서 데이터 초당 수십 GB → ClickHouse 실시간 수집/분석. PG는 서비스 트랜잭션. 이상적 조합.</div>`},

  // ── Part 8 ──
  {part:"IaC",partNum:8,num:19,q:"IaC 경험이 있으신가요? DB 인프라에 어떻게?",a:`<h4>경험</h4><ul><li>AWS CDK / CloudFormation — RDS, 파라미터그룹, 서브넷</li><li>Terraform 학습 중 (멀티 클라우드에 적합)</li></ul><h4>적용 범위</h4><ul><li>RDS/Aurora 클러스터 + 파라미터 + 네트워크</li><li>백업 정책, 모니터링 알람</li><li>Parameter Group Git 버전 관리</li></ul><h4>주의점</h4><ul><li>스키마 DDL → Flyway/Liquibase 별도 도구</li><li>Stateful DB → <code>prevent_destroy</code> 보호</li><li>파라미터 변경 시 재부팅 여부 확인 (dynamic vs static)</li></ul><div class="tip"><span class="label">42dot </span>AWS CDK (TypeScript)로 IoT Core 관리 확인. CDK 기반 DB 인프라 관리 가능.</div>`},

  // ── Part 9 ──
  {part:"장애대응",partNum:9,num:20,q:"DB 장애 대응 프로세스와 실제 경험은?",a:`<h4>프로세스</h4><ol><li><strong>탐지:</strong> Datadog/PagerDuty 알럿</li><li><strong>분류:</strong> 영향 범위 파악</li><li><strong>완화:</strong> 커넥션 킬, 페일오버, 트래픽 우회</li><li><strong>원인 분석:</strong> 로그/메트릭</li><li><strong>복구 → 사후 분석 (Post-mortem)</strong></li></ol><h4>경험 1 — tx-row-lock-contention (Session Sniper)</h4><ul><li>WCS/WMS 비정상 종료 → 좀비 세션 TX Lock → lock contention</li><li>기존: DBA 수동 (야간 대응 불가, 수십 분)</li><li>Go 데몬 개발 → 1분 주기 자동 → <strong>수십 분 → 1분 이내</strong></li></ul><h4>경험 2 — 커넥션 폭주 (PostgreSQL)</h4><ul><li>배치 쿼리 락 → 커넥션 누적 → too many connections</li><li><code>statement_timeout</code>, 커넥션 풀 도입</li></ul><h4>경험 3 — Replication Lag (PostgreSQL)</h4><ul><li>대량 DDL → WAL 급증 → Standby 지연</li><li>DDL 분할 실행 + 사전 리뷰 프로세스</li></ul>`}
];

// ── Parts & Filter ──
const parts = [...new Map(DATA.map(d=>[d.part,d])).values()].map(d=>d.part);
const filterEl = document.getElementById('filter');
const cardsEl = document.getElementById('cards');
let activePart = null;

function renderFilter(){
  filterEl.innerHTML = `<button class="chip active" data-part="">전체</button>` +
    parts.map(p=>`<button class="chip" data-part="${p}">${p}</button>`).join('');
  filterEl.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    activePart = c.dataset.part || null;
    filterEl.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    renderCards();
  });
}

function renderCards(){
  const filtered = activePart ? DATA.filter(d=>d.part===activePart) : DATA;
  document.getElementById('counter').textContent = filtered.length + ' cards';
  let html = '', lastPart = '';
  filtered.forEach(d=>{
    if(d.part !== lastPart){
      html += `<div class="part-div"><span class="num">PART ${d.partNum}</span><span class="title">${d.part}</span></div>`;
      lastPart = d.part;
    }
    html += `<div class="card" data-q="${d.num}">
      <div class="card-head" onclick="toggle(this)">
        <span class="q-num">Q${d.num}</span>
        <span class="q-text">${d.q}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="card-body"><div class="card-inner">${d.a}</div></div>
    </div>`;
  });
  cardsEl.innerHTML = html;
}

function toggle(el){el.parentElement.classList.toggle('open')}

// scroll-to-top
window.addEventListener('scroll',()=>{
  document.getElementById('topBtn').classList.toggle('show', window.scrollY > 400);
});

renderFilter();
renderCards();
</script>
