<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>42dot DB Interview Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--p:#0f3460;--a:#e94560;--bg:#0d1117;--card:#161b22;--card-open:#1c2333;--text:#e6edf3;--dim:#8b949e;--border:#30363d;--code-bg:#1e2430;--tag-bg:#1f2a3d;--tag-text:#58a6ff;--spoken-bg:#0d2a3a;--spoken-border:#2ea043;--spoken-label:#56d364}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;padding-bottom:80px}
/* nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.nav h1{font-size:15px;font-weight:700;flex:1}
.nav .cnt{font-size:12px;color:var(--dim)}
/* filter */
.filter{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid var(--border);color:var(--dim);background:transparent;cursor:pointer;transition:.2s}
.chip.active{background:var(--p);color:#fff;border-color:var(--p)}
/* cards */
.cards{padding:0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:background .2s}
.card.open{background:var(--card-open)}
.card-head{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;-webkit-user-select:none;user-select:none}
.q-num{background:var(--a);color:#fff;font-size:12px;font-weight:700;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-text{font-size:13.5px;font-weight:500;line-height:1.5;flex:1}
.arrow{color:var(--dim);font-size:18px;transition:transform .3s;flex-shrink:0}
.card.open .arrow{transform:rotate(180deg)}
.part-tag{font-size:10px;color:var(--tag-text);background:var(--tag-bg);padding:2px 8px;border-radius:10px;flex-shrink:0}
/* body */
.card-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.card.open .card-body{max-height:8000px}
.card-inner{padding:0 16px 18px}
.card-inner h4{font-size:13px;font-weight:700;color:var(--tag-text);margin:14px 0 8px;padding-left:2px}
.card-inner h4:first-child{margin-top:4px}
.card-inner p,.card-inner li{font-size:13px;line-height:1.8;color:#c9d1d9}
.card-inner ul,.card-inner ol{padding-left:18px;margin:6px 0}
.card-inner li{margin-bottom:3px}
.card-inner strong{color:var(--text)}
.card-inner code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--code-bg);color:#79c0ff;padding:2px 6px;border-radius:4px}
.card-inner pre{background:var(--code-bg);padding:14px;border-radius:8px;overflow-x:auto;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;color:#c9d1d9}
.card-inner pre code{background:none;padding:0;color:inherit}
/* table */
.card-inner table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.card-inner thead th{background:var(--p);color:#fff;padding:8px 10px;text-align:left;font-weight:500;font-size:11.5px}
.card-inner tbody td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
.card-inner tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
/* tip */
.tip{background:rgba(233,69,96,.08);border-left:3px solid var(--a);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:12.5px;line-height:1.7}
.tip .label{font-weight:700;color:var(--a)}
/* spoken answer */
.spoken{background:rgba(46,160,67,.08);border-left:3px solid var(--spoken-border);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0 18px}
.spoken-label{display:inline-block;font-size:10.5px;font-weight:700;color:var(--spoken-label);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.spoken p{font-size:13.5px;line-height:1.85;color:#d0d7de;margin:6px 0}
.spoken p:first-of-type{margin-top:2px}
.spoken p:last-of-type{margin-bottom:0}
.spoken strong{color:var(--text);font-weight:700}
.ref-divider{margin:16px 0 6px;font-size:10.5px;font-weight:700;color:var(--dim);letter-spacing:1px;padding-bottom:4px;border-bottom:1px solid var(--border)}
/* part divider */
.part-div{padding:20px 16px 8px;display:flex;align-items:center;gap:10px}
.part-div .num{font-size:11px;font-weight:700;color:var(--a);letter-spacing:2px}
.part-div .title{font-size:14px;font-weight:700;color:var(--text)}
/* scroll to top */
.top-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.4);z-index:99}
.top-btn.show{display:flex}
</style>
</head>

<script>
const DATA = [
  // ── Part 1 ──
  {part:"자기소개",partNum:1,num:1,q:"간단한 자기소개와 지원 동기를 말씀해주세요.",
   s:`<p>안녕하세요, 9년차 데이터베이스 엔지니어 서웅입니다.</p><p>커리어 전반부는 신한은행에서 5년간 Oracle RAC 기반 계정계와 정보계 시스템을 운영하며 보냈습니다. 초당 수만 건 트랜잭션이 발생하는 환경에서 <strong>"장애는 절대 일어나면 안 된다"는 감각</strong>과 HA, DR, 데이터 보안 체계를 체화했습니다.</p><p>현재는 컬리에서 DBRE를 맡으며 AWS Aurora와 PostgreSQL 기반 이커머스 DB를 운영하고 있습니다. <strong>8TB 규모 Oracle을 AWS로 무중단 전환</strong>했고, 반복 운영 업무를 줄이기 위해 <strong>Go로 Oracle Session Sniper라는 자동화 도구를 직접 개발</strong>해서 지난달부터 운영에 투입했습니다.</p><p>42dot에 지원한 이유는, 자율주행이라는 미션 크리티컬 서비스가 <strong>제가 금융에서 체득한 안정성 감각과 컬리에서 쌓은 클라우드 DB 전문성이 교차하는 지점</strong>이라고 판단했기 때문입니다. 특히 멀티 클라우드에서 PostgreSQL, MongoDB, Neo4j, ClickHouse 같은 이기종 DB를 운영한다는 점에서, 제가 그동안 쌓아온 경험이 바로 기여할 수 있다고 생각합니다.</p>`,
   a:`<p>안녕하세요, 9년차 데이터베이스 엔지니어 서웅입니다.</p><p>신한은행에서 5년간 Oracle RAC 기반 계정계/정보계 시스템을 운영하며 미션 크리티컬 환경에서의 HA, DR, 데이터 보안 체계를 체화했고, 현재 컬리에서는 AWS Aurora/PostgreSQL 기반의 대규모 이커머스 DB를 운영하며 클라우드 네이티브 전환과 자동화를 주도하고 있습니다.</p><p>42dot이 자율주행이라는 미션 크리티컬 서비스를 위해 멀티 클라우드 환경에서 RDS, MongoDB, Neo4j, ClickHouse 등 이기종 DB를 운영한다는 점에서, 제가 쌓아온 안정성 중심의 운영 철학과 클라우드 DB 전문성이 직접적으로 기여할 수 있다고 판단하여 지원했습니다.</p><div class="tip"><span class="label">Point </span>금융(안정성) + 이커머스(확장성) 두 축. 42dot JD 키워드(멀티 클라우드, 이기종 DB, DBRE)에 연결.</div>`},

  // ── Part 2 ──
  {part:"PostgreSQL",partNum:2,num:2,q:"PostgreSQL의 MVCC를 설명해주세요. Oracle과 어떤 차이가 있나요?",
   s:`<p>PostgreSQL의 MVCC는 읽기와 쓰기가 서로를 블로킹하지 않게 하는 동시성 제어 방식입니다. 각 트랜잭션이 고유한 XID를 가지고, 튜플에 <code>xmin</code>과 <code>xmax</code>를 저장해서 버전을 관리합니다. UPDATE가 발생하면 기존 행은 삭제 마킹하고 새 행을 INSERT하는 방식입니다.</p><p><strong>Oracle과의 가장 큰 차이는 Undo 처리 방식입니다.</strong> Oracle은 별도의 Undo Tablespace를 두지만, PostgreSQL은 테이블 내부에 dead tuple 형태로 남깁니다.</p><p>그래서 PostgreSQL은 Vacuum이 필수입니다. Oracle은 Undo가 자동으로 정리되지만, PostgreSQL은 autovacuum이 dead tuple을 회수해주지 않으면 테이블 bloat가 생기고, 인덱스 성능까지 저하됩니다.</p><p>컬리에서 PostgreSQL을 운영하면서 이 부분이 <strong>핵심 튜닝 포인트</strong>라는 걸 체감했고, autovacuum 파라미터 조정과 <code>pg_repack</code>을 조합해서 bloat를 관리하고 있습니다.</p>`,
   a:`<p>PostgreSQL은 MVCC를 통해 읽기/쓰기가 서로를 블로킹하지 않습니다. 각 트랜잭션은 고유 XID를 가지며, tuple에 <code>xmin</code>/<code>xmax</code>가 저장됩니다. UPDATE 시 기존 행을 삭제 마킹하고 새 행을 INSERT합니다.</p><h4>Oracle과의 차이</h4><table><thead><tr><th>항목</th><th>PostgreSQL</th><th>Oracle</th></tr></thead><tbody><tr><td>Undo 처리</td><td>테이블 내 dead tuple</td><td>별도 Undo Tablespace</td></tr><tr><td>Vacuum</td><td>필수 (dead tuple 정리)</td><td>불필요 (Undo 자동)</td></tr><tr><td>읽기 일관성</td><td>Snapshot Isolation</td><td>Undo 기반 CR</td></tr><tr><td>인덱스 영향</td><td>dead tuple이 인덱스에도 영향</td><td>Undo와 무관</td></tr></tbody></table><p>단점은 dead tuple bloat → <code>autovacuum</code> 튜닝 + <code>pg_repack</code>으로 대응.</p>`},

  {part:"PostgreSQL",partNum:2,num:3,q:"Vacuum과 Autovacuum 튜닝 경험을 설명해주세요.",
   s:`<p>Vacuum은 세 가지 역할을 합니다. <strong>첫째</strong>는 dead tuple을 회수해서 디스크 공간을 재사용하게 하고, <strong>둘째</strong>는 XID Wraparound를 방지하는 freeze, <strong>셋째</strong>는 Visibility Map을 갱신해서 Index-Only Scan을 가능하게 합니다.</p><p>실무에서는 기본값이 너무 보수적이라 조정이 필요합니다. <code>autovacuum_vacuum_scale_factor</code>를 기본 0.2에서 <strong>0.01~0.05로 낮춰서 더 자주 실행</strong>하게 하고, <code>autovacuum_vacuum_cost_delay</code>는 2ms에서 0ms로, <code>autovacuum_max_workers</code>도 늘렸습니다. 쓰기가 집중되는 테이블은 <code>ALTER TABLE SET</code>으로 개별 설정을 두는 편입니다.</p><p>컬리에서는 Datadog으로 <code>pg_stat_user_tables</code>의 <code>n_dead_tup</code>을 모니터링하고, <strong>XID age 알럿</strong>을 걸어두었습니다. bloat가 심해진 테이블은 <code>pg_repack</code>으로 온라인 재구성을 합니다.</p><p>42dot처럼 쓰기가 많은 자율주행 데이터 환경에서는 autovacuum 설계가 특히 중요할 것 같습니다.</p>`,
   a:`<h4>Vacuum의 역할</h4><ol><li>Dead tuple 회수 → 디스크 재사용</li><li>XID Wraparound 방지 (freeze)</li><li>Visibility Map 갱신 → Index-Only Scan</li></ol><h4>Autovacuum 튜닝</h4><ul><li><code>autovacuum_vacuum_scale_factor</code> 0.2 → 0.01~0.05 (더 자주 실행)</li><li><code>autovacuum_vacuum_cost_delay</code> 2ms → 0ms</li><li><code>autovacuum_max_workers</code> 증가</li><li>테이블별 개별 설정: <code>ALTER TABLE SET (...)</code></li></ul><h4>장애 예방</h4><ul><li><code>pg_stat_user_tables</code>의 <code>n_dead_tup</code> Datadog 모니터링</li><li>XID age 모니터링 → Wraparound 알럿</li><li>bloat 테이블 → <code>pg_repack</code> 온라인 REORGANIZE</li></ul>`},

  {part:"PostgreSQL",partNum:2,num:4,q:"쿼리 성능 튜닝을 어떻게 접근하시나요?",
   s:`<p>3단계로 접근합니다.</p><p><strong>첫째, 문제 식별 단계</strong>에서는 <code>pg_stat_statements</code>로 Top-N slow query를 뽑고, <code>pg_stat_activity</code>로 long-running query와 Lock 경합을 확인합니다.</p><p><strong>둘째, 실행 계획 분석</strong>입니다. <code>EXPLAIN ANALYZE</code>에 <code>BUFFERS</code> 옵션을 붙여서 실제 실행 시간과 캐시 적중률을 봅니다. Seq Scan이 나오면 인덱스 누락이나 통계 부정확을 의심하고, 대량 데이터에 Nested Loop이 붙었다면 Hash나 Merge Join을 검토합니다.</p><p><strong>셋째, 대응 단계</strong>에서는 B-tree, GIN, GiST, BRIN 중 데이터 특성에 맞는 인덱스를 설계하거나, ANALYZE로 통계를 갱신하거나, 파티셔닝을 적용합니다.</p><p>실제 사례로, <strong>컬리 물류 주문 조회 쿼리가 Seq Scan으로 30초 걸리던 것을, 복합 인덱스와 파티셔닝으로 200ms까지 줄인 경험</strong>이 있습니다.</p>`,
   a:`<h4>1단계 — 문제 식별</h4><ul><li><code>pg_stat_statements</code> Top-N slow query</li><li><code>pg_stat_activity</code> long-running query</li><li><code>pg_locks</code> + <code>pg_stat_activity</code> 조인 → Lock 경합</li></ul><h4>2단계 — 실행 계획 분석</h4><pre><code>EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT) SELECT ...;</code></pre><ul><li>Seq Scan → 인덱스 누락/통계 부정확</li><li>Nested Loop 대량 데이터 → Hash/Merge Join 검토</li><li>Buffers hit vs read → 캐시 적중률</li></ul><h4>3단계 — 대응</h4><ul><li>적절한 인덱스 (B-tree, GIN, GiST, BRIN)</li><li>ANALYZE 통계 갱신 / 파티셔닝 / 파라미터 조정</li></ul><div class="tip"><span class="label">실무 </span>컬리 물류 주문 조회 Seq Scan 30초 → 복합 인덱스 + 파티셔닝 → 200ms</div>`},

  {part:"PostgreSQL",partNum:2,num:5,q:"Replication 방식과 HA 구성 경험을 설명해주세요.",
   s:`<p>PostgreSQL Replication은 크게 두 가지입니다.</p><p><strong>Streaming Replication</strong>은 WAL을 Primary에서 Standby로 스트리밍 전송하는 방식입니다. 동기 모드는 무손실이지만 약간 지연이 생기고, 비동기 모드는 성능이 좋지만 유실 가능성이 있습니다. <strong>Logical Replication</strong>은 테이블 단위로 선택적 복제가 가능하고, 다른 버전이나 다른 DB 간에도 쓸 수 있어서 마이그레이션에 유용합니다.</p><p>HA 구성 경험은 두 가지입니다. 컬리에서는 <strong>AWS Aurora Multi-AZ로 30초 이내 자동 Failover</strong>를 구성했고, 신한 시절 On-prem 환경에서는 <strong>Patroni와 etcd 조합</strong>으로 자동 Failover를 구성했습니다.</p><p>특히 금융권에서는 <strong>RPO=0, RTO 60초 이내</strong>가 요구사항이라 동기 복제를 기본으로 썼고, 정기적인 DR 훈련을 통해 실제로 동작하는지 검증했습니다. 42dot의 자율주행 서비스도 유사한 수준의 HA가 필요할 거라 봅니다.</p>`,
   a:`<h4>Streaming Replication</h4><ul><li>WAL을 Primary → Standby 스트리밍 전송</li><li>동기: 무손실, 약간 지연 / 비동기: 성능 우수, 약간 유실 가능</li></ul><h4>Logical Replication</h4><ul><li>테이블 단위 선택적 복제, 다른 버전/DB간 가능</li><li>Publication/Subscription 모델</li></ul><h4>HA 구성 경험</h4><ul><li>AWS: Aurora Multi-AZ (자동 Failover 30초 이내)</li><li>On-prem: Patroni + etcd 자동 Failover</li><li>금융권: RPO=0 (동기) + RTO < 60초</li></ul>`},

  {part:"PostgreSQL",partNum:2,num:6,q:"인덱스 종류와 선택 기준을 설명해주세요.",
   s:`<p>PostgreSQL은 여러 인덱스 타입을 지원하는데, 데이터 특성에 맞게 선택해야 합니다.</p><p><strong>B-tree</strong>는 기본이고 등호, 범위, ORDER BY에 쓰입니다. <strong>Hash</strong>는 PG10부터 안정화되어서 단순 등호에 유리합니다. <strong>GIN</strong>은 전문검색, JSONB, 배열에 강하고, <strong>GiST</strong>는 PostGIS 같은 공간 데이터와 범위 검색에 적합합니다. <strong>BRIN</strong>은 물리적으로 정렬된 시계열 대용량에, <strong>SP-GiST</strong>는 IP나 전화번호처럼 비균형 트리 구조에 적합합니다.</p><p><strong>42dot 맥락으로 연결하면</strong>, 차량 센서 시계열은 <strong>BRIN</strong>이 용량 대비 효율적이고, HD Map 같은 위치/지도 데이터는 <strong>GiST + PostGIS</strong>, 차량 JSON 메타데이터는 <strong>GIN</strong>, pgvector에는 <strong>IVFFlat이나 HNSW</strong>가 맞습니다.</p><p>"하나의 인덱스가 모든 걸 해결하지 않는다"는 원칙으로 설계합니다.</p>`,
   a:`<table><thead><tr><th>타입</th><th>시나리오</th></tr></thead><tbody><tr><td><strong>B-tree</strong></td><td>기본. 등호/범위, ORDER BY</td></tr><tr><td><strong>Hash</strong></td><td>단순 등호 (PG10+ 안정화)</td></tr><tr><td><strong>GIN</strong></td><td>전문검색, JSONB, 배열</td></tr><tr><td><strong>GiST</strong></td><td>PostGIS, 범위, 근접 검색</td></tr><tr><td><strong>BRIN</strong></td><td>시계열 대용량 (물리정렬)</td></tr><tr><td><strong>SP-GiST</strong></td><td>비균형 트리 (IP, 전화번호)</td></tr></tbody></table><h4>42dot 맥락</h4><ul><li>센서 시계열 → <strong>BRIN</strong></li><li>위치/지도 → <strong>GiST</strong> + PostGIS</li><li>JSON 메타데이터 → <strong>GIN</strong></li><li>pgvector → <strong>IVFFlat / HNSW</strong></li></ul>`},

  {part:"PostgreSQL",partNum:2,num:7,q:"pgvector에 대해 설명해주세요. 왜 별도 VectorDB 대신 PostgreSQL을?",
   s:`<p>pgvector는 PostgreSQL 확장 모듈로, <strong>벡터를 저장하고 ANN 유사도 검색을 수행</strong>할 수 있게 해줍니다.</p><p>별도의 Vector DB 대신 pgvector를 선택하는 이유는 네 가지입니다. <strong>첫째</strong>, 운영 복잡도가 줄어듭니다. 별도 클러스터 없이 기존 PostgreSQL로 해결할 수 있습니다. <strong>둘째</strong>, 트랜잭션 지원입니다. 벡터와 메타데이터를 ACID로 함께 관리할 수 있습니다. <strong>셋째</strong>, 백업, 복제, 모니터링 같은 기존 인프라를 그대로 활용합니다. <strong>넷째</strong>, 비즈니스 테이블과 JOIN이 가능합니다.</p><p>다만 모든 케이스에 pgvector가 맞는 건 아닙니다. 42dot을 예로 들면, <strong>Atria AI처럼 수천만 클립의 주행 장면 검색은 전용 Vector DB</strong>가 적합하고, <strong>Gleo AI처럼 차량 내 매뉴얼/FAQ RAG는 수십만 규모라 pgvector가 적합</strong>합니다.</p><p>저는 지금 컬리에서 pgvector PoC를 진행하며 이런 판단 기준을 정리하고 있습니다. <strong>규모와 요구사항에 맞게 저장소를 선택하는 것이 DB 엔지니어의 핵심 역할</strong>이라고 생각합니다.</p>`,
   a:`<p>PostgreSQL 확장으로 벡터 저장 + ANN 유사도 검색 수행.</p><pre><code>CREATE EXTENSION vector;
CREATE TABLE items (id serial PRIMARY KEY, embedding vector(1536));
CREATE INDEX ON items USING hnsw (embedding vector_cosine_ops);
SELECT * FROM items ORDER BY embedding <=> '[...]' LIMIT 10;</code></pre><h4>pgvector 선택 이유</h4><ol><li>운영 복잡도 감소 (별도 클러스터 불필요)</li><li>트랜잭션 지원 (벡터 + 메타데이터 ACID)</li><li>기존 인프라 활용 (백업, 복제, 모니터링)</li><li>JOIN 가능 (비즈니스 테이블과 조인)</li></ol><h4>42dot 벡터 활용 시나리오</h4><table><thead><tr><th>영역</th><th>용도</th><th>차원</th><th>규모</th><th>저장소</th></tr></thead><tbody><tr><td><strong>주행 장면 검색<br>(Atria AI)</strong></td><td>코너 케이스 검색 — 유사 장면을 수천만 클립에서 검색<br><em>CLIP, DINOv2</em></td><td>768~1024</td><td>수천만</td><td>전용 VectorDB</td></tr><tr><td><strong>Gleo AI<br>(차량 내 RAG)</strong></td><td>매뉴얼/FAQ 벡터화 → LLM 컨텍스트<br><em>multilingual-e5, OpenAI</em></td><td>768~1536</td><td>수십만</td><td><strong>pgvector 적합</strong></td></tr></tbody></table><div class="tip"><span class="label">판단 </span>규모+요구사항에 따라 적합한 저장소 선택이 DB 엔지니어의 역할.</div>`},

  // ── Part 3 ──
  {part:"클라우드",partNum:3,num:8,q:"온프레미스 → 클라우드 마이그레이션 경험을 설명해주세요.",
   s:`<p>컬리에서 <strong>TB 규모 Oracle을 AWS Aurora MySQL로 무중단 전환</strong>한 경험을 말씀드리겠습니다.</p><p>전략은 AWS DMS의 Full Load와 CDC를 조합해서 무중단을 보장하고, 스키마 변환은 AWS SCT에 수동 검증을 병행했습니다.</p><p>가장 큰 과제는 네 가지였습니다. <strong>첫째, 데이터 정합성</strong>은 DMS validation task로 실시간 검증했습니다. <strong>둘째, Oracle PL/SQL</strong>은 MySQL 호환 코드로 재작성했습니다. <strong>셋째, 성능</strong>은 양쪽 실행 계획을 비교하고 인덱스를 재설계했습니다. <strong>넷째, Cutover</strong>는 Blue-Green 방식으로 롤백 가능하게 설계했습니다.</p><p>결과적으로 <strong>다운타임을 수 분 이내</strong>로 맞췄고, Aurora Serverless v2로 전환하면서 비용도 최적화했습니다.</p><p>42dot도 레거시 시스템이나 온프레미스 일부가 있다면, 이 경험을 바로 적용할 수 있습니다.</p>`,
   a:`<h4>컬리 마이그레이션</h4><p><strong>배경:</strong> TB 규모 Oracle → AWS Aurora MySQL</p><h4>전략</h4><ol><li>AWS DMS Full Load + CDC 무중단 마이그레이션</li><li>AWS SCT + 수동 검증 병행 스키마 변환</li></ol><h4>과제와 해결</h4><ul><li><strong>정합성:</strong> DMS validation task</li><li><strong>PL/SQL:</strong> MySQL 호환 코드 재작성</li><li><strong>성능:</strong> 실행 계획 비교 + 인덱스 재설계</li><li><strong>Cutover:</strong> Blue-Green 롤백 가능 전환</li></ul><p><strong>결과:</strong> 다운타임 수분 이내, Aurora Serverless v2 비용 최적화</p>`},

  {part:"클라우드",partNum:3,num:9,q:"Aurora Serverless v2 오토스케일링 설계 경험은?",
   s:`<p>Aurora Serverless v2를 컬리에서 도입하고 운영하면서 몇 가지 실무 경험을 쌓았습니다.</p><p>설계 원칙은 환경별로 ACU 범위를 다르게 잡았습니다. <strong>개발은 0.5~8 ACU, 운영은 4~64 ACU</strong>로 설정해서 CPU/메모리 기반으로 자동 스케일링되게 했습니다.</p><p>실제 운영에서 배운 게 세 가지 있습니다. <strong>첫째</strong>, 급격한 트래픽이 올 때 스케일업이 지연될 수 있어서 Warm Pool 전략을 고려해야 합니다. <strong>둘째</strong>, <code>max_connections</code>가 ACU에 비례해서 변동되기 때문에 <strong>커넥션 풀이 필수</strong>입니다. <strong>셋째</strong>, 스케일다운 시점에 기존 커넥션이 유지되는지 확인해야 합니다.</p><p>모니터링은 Datadog에서 ACU, 커넥션 수, 쿼리 레이턴시를 통합해서 보고 있습니다. 42dot처럼 트래픽 패턴이 변동적인 환경에 잘 맞을 거라 생각합니다.</p>`,
   a:`<h4>설계 원칙</h4><ul><li>개발: 0.5~8 ACU / 운영: 4~64 ACU</li><li>CPU/메모리 기반 자동 스케일링</li></ul><h4>실무에서 배운 점</h4><ul><li>급격한 트래픽 → 스케일업 지연 가능 → Warm Pool 활용</li><li><code>max_connections</code>가 ACU에 비례 변동 → 커넥션 풀 필수</li><li>스케일다운 시 기존 커넥션 유지 확인</li></ul><p><strong>모니터링:</strong> Datadog — ACU, 커넥션 수, 쿼리 레이턴시</p>`},

  {part:"클라우드",partNum:3,num:10,q:"멀티 클라우드 환경 DB 운영 시 고려사항은?",
   s:`<p>멀티 클라우드 DB 운영에서 고려할 점은 일곱 가지로 정리할 수 있습니다.</p><p><strong>첫째는 데이터 일관성</strong>으로, Eventual과 Strong Consistency 중 서비스 특성에 맞게 선택합니다. <strong>둘째는 네트워크</strong>로, 리전 간 지연을 최소화하기 위해 VPN이나 Direct Connect를 활용합니다. <strong>셋째는 보안</strong>으로, 클라우드별 IAM과 KMS를 통합하고 TLS 암호화를 기본으로 합니다. <strong>넷째는 IaC</strong>인데, Terraform을 쓰면 멀티 클라우드 코드를 통일된 방식으로 관리할 수 있습니다.</p><p><strong>다섯째는 모니터링 통합</strong>으로, Datadog이나 Grafana로 여러 클라우드를 한 화면에서 봅니다. <strong>여섯째는 DR</strong>로, Active-Active나 Active-Standby를 정하고 RPO, RTO를 명확히 합니다. <strong>일곱째는 비용</strong>으로, Reserved Instance와 Spot을 활용하고 태깅으로 추적합니다.</p><p>42dot이 AWS와 다른 클라우드를 함께 쓰는 환경이라고 들었는데, 이 관점들이 그대로 적용될 것 같습니다.</p>`,
   a:`<ol><li><strong>데이터 일관성:</strong> Eventual vs Strong Consistency</li><li><strong>네트워크:</strong> 리전 간 지연 최소화 (VPN/Direct Connect)</li><li><strong>보안:</strong> 클라우드별 IAM/KMS 통합, TLS 암호화</li><li><strong>IaC:</strong> Terraform 멀티 클라우드 코드 관리</li><li><strong>모니터링:</strong> Datadog/Grafana 통합</li><li><strong>DR:</strong> Active-Active/Standby, RPO/RTO 정의</li><li><strong>비용:</strong> RI, Spot, 리소스 태깅 추적</li></ol>`},

  // ── Part 4 ──
  {part:"보안",partNum:4,num:11,q:"DB 보안 관리와 민감 데이터 처리 경험은?",
   s:`<p>금융권에서 체득한 보안 경험과 PostgreSQL 고유 기능을 연결해서 말씀드리겠습니다.</p><p>신한은행에서는 <strong>RBAC와 IP 기반 접근 통제</strong>를 기본으로 하고, <code>pgaudit</code>로 DML/DDL을 감사 로그로 남겼습니다. <strong>TDE와 컬럼 레벨 암호화</strong>를 병행했고, 개발 환경에는 반드시 <strong>데이터 마스킹</strong>을 적용했습니다. 원칙은 Least Privilege, 꼭 필요한 권한만 주는 것이었습니다.</p><p>PostgreSQL에서는 <strong>Row Level Security가 강력</strong>합니다. <code>CREATE POLICY</code>로 부서별 접근 정책을 테이블 수준에서 강제할 수 있고, <code>pgaudit.log</code> 설정으로 감사 로그를 표준화할 수 있습니다.</p><p>42dot의 경우 자율주행 차량의 <strong>위치 정보와 탑승자 개인정보가 섞여있어서, 개인정보보호법과 GDPR을 고려한 데이터 수명주기 관리와 접근 통제</strong>가 특히 중요할 거라고 봅니다. 제가 금융권에서 했던 작업과 성격이 비슷합니다.</p>`,
   a:`<h4>금융권 보안 경험</h4><ul><li>RBAC + IP 기반 접근 통제</li><li>pgaudit DML/DDL 감사 로그</li><li>TDE + 컬럼 레벨 암호화</li><li>개발환경 데이터 마스킹</li><li>Principle of Least Privilege</li></ul><h4>PostgreSQL 보안</h4><pre><code>ALTER TABLE sensitive_data ENABLE ROW LEVEL SECURITY;
CREATE POLICY user_access ON sensitive_data
  FOR SELECT USING (dept = current_setting('app.dept'));

ALTER SYSTEM SET pgaudit.log = 'write, ddl';</code></pre><div class="tip"><span class="label">42dot </span>자율주행 차량 위치/탑승자 개인정보 → GDPR/개인정보보호법 준수 데이터 수명주기 관리 필요.</div>`},

  // ── Part 5 ──
  {part:"DBRE",partNum:5,num:12,q:"DBRE란 무엇이며, 어떻게 실천하고 계신가요?",
   s:`<p>DBRE는 <strong>SRE 원칙을 DB 운영에 적용</strong>하는 것입니다. Toil을 줄이고 자동화와 관측성으로 DB 신뢰성을 엔지니어링한다는 관점입니다.</p><p>제가 실제로 실천한 대표 사례는 <strong>Oracle Session Sniper 개발</strong>입니다. 기존에는 WCS/WMS가 비정상 종료되면 좀비 세션이 남아서 Lock contention이 발생했고, DBA가 수동으로 <code>v$session</code>을 확인하고 kill해야 했습니다. <strong>야간이나 주말에는 대응이 불가능</strong>했고, 인지하는 데만 수십 분이 걸렸습니다.</p><p>이걸 Go로 <strong>4주 만에 개발해서 지난 3월 31일부터 운영에 투입</strong>했습니다. 1분 주기로 자동 탐지하고, 6중 AND 조건과 CONNECT BY로 오탐을 줄였습니다. 결과적으로 <strong>24/7 자동 대응이 되고, 인지 시간도 1분 이내</strong>로 줄었습니다.</p><p>관측성은 <strong>Datadog PostgreSQL 대시보드</strong>로 커넥션, 레이턴시, 복제 지연, dead tuple, 캐시 적중률을 통합 모니터링합니다. SLO는 <strong>가용성 99.95%, P99 500ms 이하, Lag 1초 이하</strong>로 정의해서 관리합니다.</p>`,
   a:`<p><strong>DBRE:</strong> SRE 원칙을 DB 운영에 적용. Toil 줄이고, 자동화+관측성으로 DB 신뢰성을 엔지니어링.</p><h4>1. 자동화 — Oracle Session Sniper</h4><table><thead><tr><th>항목</th><th>기존 (수동)</th><th>개선 (Sniper)</th></tr></thead><tbody><tr><td>대응</td><td>DBA v$session 수동 Kill</td><td>1분 주기 자동 탐지/Kill</td></tr><tr><td>야간/주말</td><td>대응 불가</td><td>24/7 자동</td></tr><tr><td>인지 시간</td><td>수십 분</td><td>1분 이내</td></tr><tr><td>오탐</td><td>수동 판단</td><td>6중 AND + CONNECT BY</td></tr></tbody></table><ul><li>On-Prem RAC + AWS RDS 이기종 통합</li><li>Slack Block Kit 알림 + MySQL 이력 로깅</li><li>Docker + Github Actions CI/CD → ECR → EC2</li><li>4주 개발 → <strong>2026-03-31 live 운영 중</strong></li></ul><h4>2. 관측성</h4><ul><li>Datadog PostgreSQL 대시보드 (Connection, Latency, Lag, Dead tuple, Cache hit)</li></ul><h4>3. SLO/SLI</h4><ul><li>가용성 99.95% / P99 < 500ms / Lag < 1초</li></ul>`},

  {part:"DBRE",partNum:5,num:13,q:"운영 자동화 도구를 직접 개발한 경험이 있나요?",
   s:`<p>대표 사례는 <strong>Go로 만든 Oracle Session Sniper</strong>입니다.</p><p>기술적으로는 Go 1.25에 Pure Go 드라이버인 <code>sijms/go-ora</code>를 써서 CGO 의존성을 없앴고, <strong>goroutine과 WaitGroup으로 여러 DB를 병렬 처리</strong>합니다. On-Prem RAC와 AWS RDS가 혼재된 환경이라 쿼리를 자동 분기시켰고, Blocking Tree는 CONNECT BY와 GV$LOCK JOIN으로 추출했습니다.</p><p>운영 측면에서는 <strong>Slack Block Kit으로 컬러바, 코드블록, 스레드를 활용한 알림</strong>을 만들고, 에러 알림은 30분 쿨다운을 걸었습니다. Kill 이력은 MySQL의 <code>session_cemetery</code> 테이블에 적재해서 추적합니다. 배포는 Docker Multi-stage로 빌드해서 Github Actions로 ECR에 올리고, EC2 crontab에서 돌립니다. YAML 외부 설정으로 <strong>dry-run을 기본 true</strong>로 두어서 사고를 방지했습니다.</p><p>단일 <code>main.go</code> 약 <strong>1,012줄, 4주 개발</strong>해서 운영 중입니다. Python으로는 <code>pg_stat_statements</code> 분석 리포트와 마이그레이션 정합성 검증 스크립트를, Bash로는 일일/주간 DB 점검 스크립트를 운영하고 있습니다.</p>`,
   a:`<h4>Go — Oracle Session Sniper (대표)</h4><ul><li>Go 1.25, Pure Go 드라이버(<code>sijms/go-ora</code>) — CGO 불필요</li><li>goroutine + WaitGroup 다중 DB 병렬 처리</li><li>CONNECT BY Blocking Tree + GV$LOCK JOIN</li><li>On-Prem RAC / AWS RDS 자동 분기</li><li>Slack Bot API (Block Kit) — 컬러바+코드블록+스레드, 에러 쿨다운 30분</li><li>MySQL <code>session_cemetery</code> Kill 이력 적재</li><li>Docker Multi-stage → Github Actions → ECR → EC2 crontab</li><li>YAML 외부 설정 + dry-run 기본 true</li><li>단일 <code>main.go</code> 1,012줄, 4주 개발 → 운영 중</li></ul><h4>Python</h4><ul><li>pg_stat_statements 쿼리 분석 리포트</li><li>마이그레이션 데이터 정합성 검증</li></ul><h4>Bash</h4><ul><li>일일/주간 DB 점검 (디스크, 커넥션, Replication, 백업)</li></ul>`},

  // ── Part 6 ──
  {part:"MongoDB",partNum:6,num:14,q:"MongoDB와 RDBMS 차이. 어떤 상황에서 MongoDB를?",
   s:`<p>둘은 모델링 철학이 다른 DB입니다.</p><p><strong>PostgreSQL은</strong> 정규화된 테이블과 행 기반, 고정 스키마, 강력한 ACID, Scale-up 중심입니다. <strong>MongoDB는</strong> Document 기반의 BSON 구조, Schema-less, 4.0부터 멀티 문서 ACID 지원, Scale-out 중심입니다. JOIN도 PostgreSQL은 네이티브로 강력한데, MongoDB는 <code>$lookup</code>으로 제한적입니다.</p><p>그래서 MongoDB가 적합한 시나리오는 <strong>스키마가 자주 변경되거나 비정형 데이터를 다룰 때</strong>, 예를 들어 IoT 센서 로그나 차량 상태 로그 같은 것들, 그리고 <strong>수평 확장으로 대용량 쓰기를 처리</strong>해야 할 때입니다.</p><p>솔직히 말씀드리면 저는 <strong>현재 MongoDB를 hands-on으로 학습 중</strong>입니다. CRUD, Aggregation, Replica Set, Sharding까지 공부하고 있고, RDBMS 9년 경험이 있어서 빠르게 적응할 수 있다고 생각합니다. 42dot 합류 후 초기 3개월 내에 프로덕션 수준으로 끌어올릴 자신이 있습니다.</p>`,
   a:`<table><thead><tr><th>항목</th><th>PostgreSQL</th><th>MongoDB</th></tr></thead><tbody><tr><td>모델</td><td>정규화 테이블/행</td><td>Document (BSON)</td></tr><tr><td>스키마</td><td>고정</td><td>Schema-less</td></tr><tr><td>트랜잭션</td><td>강력 ACID</td><td>4.0+ 멀티문서 ACID</td></tr><tr><td>확장</td><td>Scale-up</td><td>Scale-out (샤딩)</td></tr><tr><td>JOIN</td><td>네이티브</td><td>$lookup (제한적)</td></tr></tbody></table><h4>MongoDB 선택 시나리오</h4><ul><li>스키마 자주 변경 / 비정형 데이터 (IoT, 로그)</li><li>수평 확장 대용량 쓰기</li></ul><div class="tip"><span class="label">솔직하게 </span>현재 hands-on 학습 중. CRUD, Aggregation, Replica Set, Sharding 학습. RDBMS 경험 기반 빠른 적응 가능.</div>`},

  {part:"MongoDB",partNum:6,num:15,q:"MongoDB Replica Set과 Sharding을 설명해주세요.",
   s:`<p>MongoDB의 HA는 <strong>Replica Set</strong>으로 구성합니다. Primary 1대와 Secondary N대로 이루어지고, Primary 장애 시 Election을 통해 자동 Failover됩니다. Read Preference 설정으로 읽기를 Secondary에 분산할 수 있고, 복제는 <code>oplog</code> 기반으로 비동기적으로 일어납니다.</p><p><strong>Sharding</strong>은 수평 확장을 위한 구조로, <code>mongos</code>라는 라우터와 config server, 그리고 실제 데이터를 담는 shard로 구성됩니다. 각 shard 자체가 Replica Set이라 HA도 함께 확보됩니다.</p><p>여기서 가장 중요한 건 <strong>Shard Key 선택</strong>입니다. 카디널리티가 높고 쓰기 분산이 고른 필드여야 합니다. Range Sharding은 범위 쿼리에 유리하지만 hotspot 위험이 있고, Hash Sharding은 고른 분산을 보장하지만 범위 쿼리에는 불리합니다.</p><p>PostgreSQL도 Citus로 분산이 가능하지만, <strong>네이티브 샤딩은 MongoDB가 더 완성도 있고 수평 확장이 용이</strong>하다고 생각합니다.</p>`,
   a:`<h4>Replica Set</h4><ul><li>Primary 1 + Secondary N, Election 자동 Failover</li><li>Read Preference로 읽기 분산</li><li>oplog 기반 복제</li></ul><h4>Sharding</h4><ul><li>mongos(라우터) + config server + shard(replica set)</li><li>Shard Key = 카디널리티 높고 쓰기 분산 고른 필드</li><li>Range vs Hash Sharding</li></ul><p>PostgreSQL은 Citus로 분산 가능하지만, MongoDB는 네이티브 샤딩으로 수평 확장이 더 용이.</p>`},

  // ── Part 7 ──
  {part:"42dot",partNum:7,num:16,q:"자율주행에서 DB 엔지니어의 역할은?",
   s:`<p>자율주행에서 DB 엔지니어의 역할은 <strong>데이터 유형별 적합한 저장소를 선택하고 전체 아키텍처를 운영</strong>하는 것이라고 생각합니다.</p><p>예를 들어 <strong>LiDAR, 카메라, GPS 같은 센서 텔레메트리</strong>는 대용량 OLAP가 필요하니 ClickHouse가 적합합니다. <strong>HD Map과 경로 같은 공간 데이터</strong>는 PostGIS나 Neo4j, <strong>차량 상태와 펌웨어, OTA 정보</strong>는 스키마가 유연해야 하니 MongoDB, <strong>예약과 결제 같은 서비스 트랜잭션</strong>은 PostgreSQL, <strong>ML 임베딩</strong>은 pgvector나 Milvus를 씁니다.</p><p>DB 엔지니어의 역할은 네 가지로 정리할 수 있습니다. <strong>첫째</strong>, 데이터 특성에 맞는 저장소 선택과 설계. <strong>둘째</strong>, 멀티 DB 통합 운영과 모니터링. <strong>셋째</strong>, 미션 크리티컬에 맞는 HA, DR, 보안. <strong>넷째</strong>, 개발팀과의 스키마 리뷰와 쿼리 최적화 지원입니다.</p><p>제가 <strong>금융과 이커머스에서 쌓은 경험이 이 네 가지에 모두 매핑</strong>됩니다.</p>`,
   a:`<table><thead><tr><th>데이터 유형</th><th>예시</th><th>저장소</th></tr></thead><tbody><tr><td>센서/텔레메트리</td><td>LiDAR, 카메라, GPS</td><td>ClickHouse</td></tr><tr><td>지도/공간</td><td>HD Map, 경로</td><td>PostGIS / GraphDB</td></tr><tr><td>차량 상태</td><td>펌웨어, OTA</td><td>MongoDB</td></tr><tr><td>서비스 트랜잭션</td><td>예약, 결제</td><td>PostgreSQL</td></tr><tr><td>ML 임베딩</td><td>모델 학습 데이터</td><td>pgvector / Milvus</td></tr></tbody></table><h4>역할</h4><ul><li>데이터 특성별 <strong>적합한 저장소 선택/설계</strong></li><li>멀티 DB <strong>통합 운영/모니터링</strong></li><li>미션 크리티컬 <strong>HA/DR/보안</strong></li><li>개발팀 <strong>스키마 리뷰 & 쿼리 최적화 지원</strong></li></ul>`},

  {part:"42dot",partNum:7,num:17,q:"Neo4j(GraphDB)에 대한 이해가 있으신가요?",
   s:`<p>Neo4j에 대한 운영 경험은 없지만 개념은 학습 중입니다.</p><p>Neo4j는 <strong>Property Graph 모델</strong>로, Node와 Relationship, Property로 데이터를 표현합니다. <code>Cypher</code>라는 선언적 쿼리 언어를 쓰고, 예를 들어 <code>MATCH (a)-[:KNOWS]->(b) RETURN a, b</code> 같은 형태로 관계를 탐색합니다.</p><p>가장 큰 강점은 <strong>관계 탐색이 O(1)</strong>이라는 점입니다. RDBMS에서 JOIN으로 3~4단계를 거슬러 올라가면 성능이 급격히 떨어지는데, GraphDB는 <strong>관계 자체를 포인터로 저장</strong>해서 훨씬 빠릅니다.</p><p>42dot에서는 <strong>HD Map의 도로 네트워크 모델링</strong>에 잘 맞을 것 같습니다. 교차로를 Node로, 도로를 Relationship으로 모델링하면 최단 경로 계산이나 교통 상황에 따른 경로 재계산이 자연스럽게 됩니다. V2X 통신이나 플릿 관리에서도 차량 간 관계를 표현하는 데 쓸 수 있습니다.</p><p>RDBMS에서 쌓은 모델링 경험을 기반으로, 합류 후 빠르게 익힐 수 있다고 봅니다.</p>`,
   a:`<h4>기본 이해</h4><ul><li>Property Graph: Node + Relationship + Property</li><li>Cypher: <code>MATCH (a)-[:KNOWS]->(b) RETURN a,b</code></li><li>관계 탐색 O(1) → JOIN 대비 관계 쿼리 압도적</li></ul><h4>42dot 활용 가능성</h4><ul><li>HD Map 도로 네트워크 (교차로=Node, 도로=Relationship)</li><li>최단 경로 / 교통 상황 경로 계산</li><li>V2X, 플릿 관리 관계 모델링</li></ul><p>운영 경험은 없지만 개념 학습 중. RDBMS 모델링 경험 기반 빠른 적용 가능.</p>`},

  {part:"42dot",partNum:7,num:18,q:"ClickHouse는 어떤 경우에? PostgreSQL과 차이?",
   s:`<p>ClickHouse는 <strong>OLAP 특화 컬럼 기반 DB</strong>입니다. PostgreSQL과는 용도가 완전히 다릅니다.</p><p>저장 구조부터 다른데, PostgreSQL은 Row-based로 트랜잭션 처리에 최적화되어 있고, ClickHouse는 Column-based로 분석 쿼리에 최적화되어 있습니다. UPDATE와 DELETE는 PostgreSQL은 완전 지원이지만 ClickHouse는 Mutation이라는 제한적 방식으로 동작합니다. 트랜잭션도 PostgreSQL은 MVCC가 강력하지만 ClickHouse는 대량 INSERT 최적화에 초점이 맞춰져 있습니다. 대신 <strong>압축률은 LZ4나 ZSTD로 매우 높습니다</strong>.</p><p>42dot 맥락에서 보면, <strong>자율주행 센서 데이터는 초당 수십 GB 단위로 쏟아지는데 이걸 실시간 수집하고 분석하려면 ClickHouse가 이상적</strong>입니다. 반면 예약, 결제 같은 서비스 트랜잭션은 PostgreSQL이 담당하는 게 맞습니다.</p><p>이 두 개를 <strong>병행해서 쓰는 게 자율주행 데이터 플랫폼의 이상적 조합</strong>이라고 봅니다.</p>`,
   a:`<table><thead><tr><th>항목</th><th>PostgreSQL</th><th>ClickHouse</th></tr></thead><tbody><tr><td>저장</td><td>Row-based</td><td>Column-based</td></tr><tr><td>워크로드</td><td>OLTP</td><td>OLAP</td></tr><tr><td>UPDATE/DELETE</td><td>완전 지원</td><td>제한적 (Mutation)</td></tr><tr><td>트랜잭션</td><td>MVCC 강력</td><td>대량 INSERT 최적화</td></tr><tr><td>압축</td><td>보통</td><td>매우 높음 (LZ4/ZSTD)</td></tr></tbody></table><div class="tip"><span class="label">42dot </span>자율주행 센서 데이터 초당 수십 GB → ClickHouse 실시간 수집/분석. PG는 서비스 트랜잭션. 이상적 조합.</div>`},

  // ── Part 8 ──
  {part:"IaC",partNum:8,num:19,q:"IaC 경험이 있으신가요? DB 인프라에 어떻게?",
   s:`<p>IaC는 <strong>AWS CDK와 CloudFormation 중심으로 경험</strong>이 있고, Terraform은 학습 중입니다.</p><p>적용 범위는 RDS와 Aurora 클러스터, 파라미터 그룹, 서브넷, 보안 그룹 같은 네트워크까지 코드로 관리합니다. 백업 정책과 모니터링 알람도 포함하고, <strong>Parameter Group은 Git으로 버전 관리해서 변경 이력을 추적</strong>합니다.</p><p>실무에서 주의할 점은 세 가지입니다. <strong>첫째</strong>, 스키마 DDL은 IaC가 아니라 Flyway나 Liquibase 같은 별도 도구로 관리해야 합니다. <strong>둘째</strong>, Stateful한 DB는 <code>prevent_destroy</code> 같은 보호 설정을 반드시 겁니다. <strong>셋째</strong>, 파라미터 변경이 재부팅을 요구하는지, 동적 변경인지 정적인지 꼭 확인합니다.</p><p>42dot이 <strong>AWS CDK를 TypeScript로 써서 IoT Core를 관리</strong>한다고 들었는데, 저도 CDK 기반으로 DB 인프라를 관리할 수 있습니다. Terraform이 필요하다면 멀티 클라우드 환경에 더 적합하다고 보고, 합류 후 본격적으로 투입할 생각입니다.</p>`,
   a:`<h4>경험</h4><ul><li>AWS CDK / CloudFormation — RDS, 파라미터그룹, 서브넷</li><li>Terraform 학습 중 (멀티 클라우드에 적합)</li></ul><h4>적용 범위</h4><ul><li>RDS/Aurora 클러스터 + 파라미터 + 네트워크</li><li>백업 정책, 모니터링 알람</li><li>Parameter Group Git 버전 관리</li></ul><h4>주의점</h4><ul><li>스키마 DDL → Flyway/Liquibase 별도 도구</li><li>Stateful DB → <code>prevent_destroy</code> 보호</li><li>파라미터 변경 시 재부팅 여부 확인 (dynamic vs static)</li></ul><div class="tip"><span class="label">42dot </span>AWS CDK (TypeScript)로 IoT Core 관리 확인. CDK 기반 DB 인프라 관리 가능.</div>`},

  // ── Part 9 ──
  {part:"장애대응",partNum:9,num:20,q:"DB 장애 대응 프로세스와 실제 경험은?",
   s:`<p>장애 대응은 <strong>5단계 프로세스</strong>로 움직입니다. 탐지, 분류, 완화, 원인 분석, 복구 후 사후 분석입니다. Datadog이나 PagerDuty로 알럿을 받고, 영향 범위를 분류한 다음, 우선 서비스를 살리는 완화 조치를 하고, 그 뒤 로그와 메트릭으로 원인을 분석하고, 마지막에 Post-mortem으로 재발 방지책을 세웁니다.</p><p>구체적인 경험을 세 가지 말씀드리겠습니다.</p><p><strong>첫째, tx-row-lock-contention 장애</strong>입니다. WCS/WMS가 비정상 종료되면 좀비 세션이 TX Lock을 잡아서 서비스가 멎었는데, 기존에는 DBA가 수동으로 대응했고 야간에는 대응이 불가능했습니다. <strong>Go로 Session Sniper를 만들어서 1분 주기로 자동 대응</strong>하게 바꿨고, 수십 분 걸리던 인지 시간을 1분 이내로 줄였습니다.</p><p><strong>둘째, PostgreSQL 커넥션 폭주</strong>입니다. 배치 쿼리가 락을 잡고 놓지 않아서 커넥션이 누적되고 too many connections가 발생했습니다. <code>statement_timeout</code>을 걸고 커넥션 풀을 도입해서 해결했습니다.</p><p><strong>셋째, Replication Lag</strong>입니다. 대량 DDL이 WAL을 급증시켜서 Standby가 지연됐는데, <strong>DDL 분할 실행과 사전 리뷰 프로세스</strong>를 만들어서 예방 체계로 전환했습니다.</p><p>42dot의 자율주행 서비스는 <strong>장애가 안전과 직결</strong>되기 때문에, 이런 프로세스와 자동화 경험이 바로 적용될 수 있다고 봅니다.</p>`,
   a:`<h4>프로세스</h4><ol><li><strong>탐지:</strong> Datadog/PagerDuty 알럿</li><li><strong>분류:</strong> 영향 범위 파악</li><li><strong>완화:</strong> 커넥션 킬, 페일오버, 트래픽 우회</li><li><strong>원인 분석:</strong> 로그/메트릭</li><li><strong>복구 → 사후 분석 (Post-mortem)</strong></li></ol><h4>경험 1 — tx-row-lock-contention (Session Sniper)</h4><ul><li>WCS/WMS 비정상 종료 → 좀비 세션 TX Lock → lock contention</li><li>기존: DBA 수동 (야간 대응 불가, 수십 분)</li><li>Go 데몬 개발 → 1분 주기 자동 → <strong>수십 분 → 1분 이내</strong></li></ul><h4>경험 2 — 커넥션 폭주 (PostgreSQL)</h4><ul><li>배치 쿼리 락 → 커넥션 누적 → too many connections</li><li><code>statement_timeout</code>, 커넥션 풀 도입</li></ul><h4>경험 3 — Replication Lag (PostgreSQL)</h4><ul><li>대량 DDL → WAL 급증 → Standby 지연</li><li>DDL 분할 실행 + 사전 리뷰 프로세스</li></ul>`}
];

// ── Parts & Filter ──
const parts = [...new Map(DATA.map(d=>[d.part,d])).values()].map(d=>d.part);
const filterEl = document.getElementById('filter');
const cardsEl = document.getElementById('cards');
let activePart = null;

function renderFilter(){
  filterEl.innerHTML = `<button class="chip active" data-part="">전체</button>` +
    parts.map(p=>`<button class="chip" data-part="${p}">${p}</button>`).join('');
  filterEl.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    activePart = c.dataset.part || null;
    filterEl.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    renderCards();
  });
}

function renderCards(){
  const filtered = activePart ? DATA.filter(d=>d.part===activePart) : DATA;
  document.getElementById('counter').textContent = filtered.length + ' cards';
  let html = '', lastPart = '';
  filtered.forEach(d=>{
    if(d.part !== lastPart){
      html += `<div class="part-div"><span class="num">PART ${d.partNum}</span><span class="title">${d.part}</span></div>`;
      lastPart = d.part;
    }
    const spokenBlock = d.s ? `<div class="spoken"><span class="spoken-label">답변 예시</span>${d.s}</div><div class="ref-divider">참고 자료</div>` : '';
    html += `<div class="card" data-q="${d.num}">
      <div class="card-head" onclick="toggle(this)">
        <span class="q-num">Q${d.num}</span>
        <span class="q-text">${d.q}</span>
        <span class="arrow">▾</span>
      </div>
      <div class="card-body"><div class="card-inner">${spokenBlock}${d.a}</div></div>
    </div>`;
  });
  cardsEl.innerHTML = html;
}

function toggle(el){el.parentElement.classList.toggle('open')}

// scroll-to-top
window.addEventListener('scroll',()=>{
  document.getElementById('topBtn').classList.toggle('show', window.scrollY > 400);
});

renderFilter();
renderCards();
</script>
</body>
</html>
